[build]
  base = "client"
  publish = "dist"
  command = "npm install && npm run build"

[build.environment]
  VITE_API_URL = "https://bafly-server.onrender.com"
  VITE_SOCKET_URL = "https://bafly-server.onrender.com"

[[redirects]]
  from = "/child-safety.html"
  to = "/child-safety.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
