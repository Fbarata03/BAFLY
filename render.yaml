services:
  - type: web
    name: bafly-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /healthz
    autoDeploy: true
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 3001
      # Defina estes no painel do Render (NÃO comite segredos):
